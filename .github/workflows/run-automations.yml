name: E2E (Playwright + Percy)

on:
  push:
    branches: [ "main" ]          # run when you push to main
  
permissions:
  contents: read
  pages: write
  id-token: write             # optional manual trigger too

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright with Percy
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
          FLIGHT_API: ${{ secrets.FLIGHT_API }}
          
        run: |
          npx percy exec -- npx playwright test /tests/Travel documents/ /tests/Passport-tests/ /tests/Mobile/ /tests/visual/ --workers 3 
      

      - name: Upload Playwright report to Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

      - name: Deploy to GitHub Pages
        if: always()
        uses: actions/deploy-pages@v4